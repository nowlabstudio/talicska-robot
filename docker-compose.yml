name: robot

# Talicska robot — production stack
#
# Services managed here:
#   microros_agent  — bridges RP2040 bridges (RC, Input, Tilt) to ROS2
#   robot           — ros2_control + bringup (RoboClaw, EKF, Nav2)
#
# NOT managed here (separate stack):
#   RealSense D435i — Isaac ROS alapú stack (WIP, átírás folyamatban)
#                     Régi: robot/realsense-jetson/ (deprecated, git-ben marad validálásig)
#                     Új:   nvcr.io/isaac/ros:noble-ros2_jazzy_*-arm64 alapon
#                     Publishes /camera/camera/imu, /camera/camera/depth/*
#                     on host network — visible to all containers.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f robot

services:

  microros_agent:
    container_name: microros_agent
    image: microros/micro-ros-agent:jazzy
    network_mode: host
    ipc: host
    restart: unless-stopped
    command: udp4 -p ${MICROROS_AGENT_PORT:-8888}

  robot:
    container_name: robot
    build:
      context: ../..
      dockerfile: robot/talicska-robot/Dockerfile
      network: host
    network_mode: host
    ipc: host
    restart: unless-stopped
    stop_grace_period: 60s
    privileged: true          # serial port (rplidar ttyUSB) cgroup device access — /dev:/dev volume alone is insufficient
    depends_on:
      - microros_agent
    env_file: .env
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - /dev:/dev
      - ./cyclonedds.xml:/root/talicska-robot/cyclonedds.xml:ro
      # Globális robot paraméter konfig — rebuild NEM kell, csak docker compose up -d robot
      - ./config:/config:ro
      # Config + launch override — rebuild NEM kell, csak docker compose restart robot
      - ./robot_bringup/config/ekf.yaml:/root/talicska-ws/install/robot_bringup/share/robot_bringup/config/ekf.yaml:ro
      - ./robot_bringup/config/slam_params.yaml:/root/talicska-ws/install/robot_bringup/share/robot_bringup/config/slam_params.yaml:ro
      - ./robot_bringup/config/nav2_params.yaml:/root/talicska-ws/install/robot_bringup/share/robot_bringup/config/nav2_params.yaml:ro
      - ./robot_bringup/launch/robot.launch.py:/root/talicska-ws/install/robot_bringup/share/robot_bringup/launch/robot.launch.py:ro
      - ./robot_bringup/launch/hardware.launch.py:/root/talicska-ws/install/robot_bringup/share/robot_bringup/launch/hardware.launch.py:ro
      - ./robot_bringup/launch/sensors.launch.py:/root/talicska-ws/install/robot_bringup/share/robot_bringup/launch/sensors.launch.py:ro
      - ./robot_bringup/launch/navigation.launch.py:/root/talicska-ws/install/robot_bringup/share/robot_bringup/launch/navigation.launch.py:ro
      - ./robot_safety/launch/safety.launch.py:/root/talicska-ws/install/robot_safety/share/robot_safety/launch/safety.launch.py:ro
      - ./robot_teleop/launch/teleop.launch.py:/root/talicska-ws/install/robot_teleop/share/robot_teleop/launch/teleop.launch.py:ro
      - ./robot_bringup/config/controllers.yaml:/root/talicska-ws/install/robot_bringup/share/robot_bringup/config/controllers.yaml:ro
      - ./robot_teleop/config/twist_mux.yaml:/root/talicska-ws/install/robot_teleop/share/robot_teleop/config/twist_mux.yaml:ro
      - ./robot_description/urdf/robot.urdf.xacro:/root/talicska-ws/install/robot_description/share/robot_description/urdf/robot.urdf.xacro:ro
      - ./robot_description/meshes/:/root/talicska-ws/install/robot_description/share/robot_description/meshes/:ro
      # /data/maps: perzisztens térképek (host gépen tárolt)
      - /data/maps:/data/maps
    # Stack selector a .env-ből — minden más param /config/robot_params.yaml-ból jön
    command: >
      ros2 launch robot_bringup robot.launch.py
      use_nav:=${USE_NAV:-false}
