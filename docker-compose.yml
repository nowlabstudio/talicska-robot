services:

  microros_agent:
    image: microros/micro-ros-agent:jazzy
    network_mode: host
    restart: unless-stopped
    command: udp4 -p ${MICROROS_AGENT_PORT:-8888}

  robot:
    build: .
    network_mode: host
    restart: unless-stopped
    depends_on:
      - microros_agent
    env_file: .env
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - /dev:/dev
    command: ros2 launch robot_bringup hardware.launch.py tcp_host:=${ROBOCLAW_HOST:-192.168.68.60}

  realsense:
    image: nowlabstudio/realsense-jetson:latest
    network_mode: host
    restart: unless-stopped
    devices:
      - /dev/bus/usb:/dev/bus/usb
    # TODO: refactor entrypoint to accept launch args (Phase 3)
