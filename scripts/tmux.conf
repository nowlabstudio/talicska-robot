# =============================================================================
# Talicska Robot — tmux konfiguráció
# =============================================================================
# Betöltés: install.sh másolja ~/.tmux.conf-ra
#           tmux_session.sh -f scripts/tmux.conf flaggel tölti be

# ── Alap beállítások ──────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g base-index 1             # ablak számozás 1-től (0 a billentyűzet másik végén)
setw -g pane-base-index 1
set -g renumber-windows on      # ablak számok folyamatosak maradnak bezárás után
set -g escape-time 10           # ESC delay csökkentése (vim barát)
set -g focus-events on

# ── Egér ─────────────────────────────────────────────────────────────────────
set -g mouse on                 # görgetés, ablakváltás, panel átméretezés egérrel

# ── Ablak / panel kezelés ─────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"   # vízszintes split
bind - split-window -v -c "#{pane_current_path}"   # függőleges split
bind c new-window      -c "#{pane_current_path}"   # új ablak ugyanabból a könyvtárból

# Panel navigáció Alt+nyíl (prefix nélkül)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Ablakváltás Shift+nyíl (prefix nélkül)
bind -n S-Left  previous-window
bind -n S-Right next-window

# ── Státuszsor ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom

set -g status-style                 "bg=colour235,fg=colour250"
set -g window-status-current-style  "bg=colour27,fg=colour255,bold"
set -g pane-border-style            "fg=colour238"
set -g pane-active-border-style     "fg=colour27"
set -g message-style                "bg=colour27,fg=colour255"

# Bal: session név
set -g status-left-length 20
set -g status-left  "#[bg=colour27,fg=colour255,bold] #S #[default] "

# Jobb: dátum + idő
set -g status-right-length 30
set -g status-right "#[fg=colour250]%Y-%m-%d  %H:%M #[default]"

# Ablak lista
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
