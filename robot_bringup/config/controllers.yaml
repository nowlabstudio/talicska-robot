controller_manager:
  ros__parameters:
    # 50 Hz — RoboClaw TCP round-trip ~7-8ms (GetEncoders) + ~3ms (1 rotating diag slot)
    # = ~11ms per cycle. Fits 20ms budget (50Hz) comfortably; overflows at 100Hz because
    # the USR-K6 serial bridge latency alone consumes most of the 10ms budget.
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    # Rear wheels are driven by RoboClaw (front wheels are mechanically linked).
    # Joint names must match ros2_control section in robot.urdf.xacro.
    left_wheel_names:  [rear_left_wheel_joint]
    right_wheel_names: [rear_right_wheel_joint]

    wheel_separation: 0.7    # 700 mm track width (centre-centre)
    wheel_radius: 0.19       # 380 mm diameter

    # Velocity limits — nested format required in Jazzy diff_drive_controller 4.x.
    # max_velocity matches ~14 km/h = 3.89 m/s (physical max in RC mode).
    # Nav2 is separately limited to 2.22 m/s (8 km/h) in nav2_params.yaml.
    linear:
      x:
        has_velocity_limits: true
        has_acceleration_limits: false
        max_velocity:  3.89
        min_velocity: -3.89
    angular:
      z:
        has_velocity_limits: true
        has_acceleration_limits: false
        # max = 2 * max_wheel_speed / wheel_separation = 2 * 3.89 / 0.7 = 11.11
        max_velocity:  11.11
        min_velocity: -11.11

    publish_rate: 50.0

    # open_loop: false — encoders mounted and calibrated in Motion Studio.
    # Closed-loop mode: diff_drive_controller uses encoder feedback for odometry.
    open_loop: false

    # Safety: stop motors if no cmd_vel arrives within 500 ms.
    cmd_vel_timeout: 0.5

    odom_frame_id: odom
    base_frame_id: base_link
    # EKF aktív (imu0: BNO085 yaw+vyaw) → EKF publikálja az odom→base_link TF-et.
    # Kikapcsoláshoz (EKF nélkül): true + ekf_filter_node publish_tf: false
    enable_odom_tf: false

    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
