controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    # Rear wheels are driven by RoboClaw (front wheels are mechanically linked).
    # Joint names must match ros2_control section in robot.urdf.xacro.
    left_wheel_names:  [rear_left_wheel_joint]
    right_wheel_names: [rear_right_wheel_joint]

    wheel_separation: 0.8    # 800 mm track width
    wheel_radius: 0.2        # 400 mm diameter

    # Velocity limits (ROS mode: 8 km/h = 2.22 m/s)
    max_vel_x: 2.22
    min_vel_x: -0.5
    max_vel_theta: 1.5
    min_vel_theta: -1.5

    publish_rate: 50.0
    open_loop: false         # encoder feedback active

    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: true

    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    use_stamped_vel: false
