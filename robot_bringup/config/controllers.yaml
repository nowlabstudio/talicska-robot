controller_manager:
  ros__parameters:
    # 50 Hz — RoboClaw TCP round-trip ~7-8ms (GetEncoders) + ~5ms (SetSpeed).
    # 100 Hz (10ms budget) → constant overrun. 50 Hz (20ms budget) → fits comfortably.
    # ROS2_RoboClaw optimizations (write-on-change, rotating diags) designed for 50 Hz.
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    # Rear wheels are driven by RoboClaw (front wheels are mechanically linked).
    # Joint names must match ros2_control section in robot.urdf.xacro.
    left_wheel_names:  [rear_left_wheel_joint]
    right_wheel_names: [rear_right_wheel_joint]

    wheel_separation: 0.8    # 800 mm track width
    wheel_radius: 0.2        # 400 mm diameter

    # Velocity limits — nested format required in Jazzy diff_drive_controller 4.x.
    # max_velocity matches duty_max_rad_s * wheel_radius = 22.5 * 0.2 = 4.5 m/s
    # → 100% duty at max speed.
    # Nav2 is separately limited to 2.22 m/s (8 km/h) in nav2_params.yaml.
    linear:
      x:
        has_velocity_limits: true
        has_acceleration_limits: false
        max_velocity:  4.5
        min_velocity: -4.5
    angular:
      z:
        has_velocity_limits: true
        has_acceleration_limits: false
        # max = 2 * max_wheel_speed / wheel_separation = 2 * 4.5 / 0.8 = 11.25
        max_velocity:  11.25
        min_velocity: -11.25

    publish_rate: 50.0

    # open_loop: true — required when encoders are not mounted.
    # Closed-loop with no encoders causes noise-driven motor fighting.
    # Switch to false once encoders are wired and tested.
    open_loop: true

    # Safety: stop motors if no cmd_vel arrives within 500 ms.
    cmd_vel_timeout: 0.5

    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: true

    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
